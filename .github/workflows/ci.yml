name: CI

on:
  push:
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Bash syntax
        run: bash -n release.sh deploy.sh release.sh scripts/security-scan.sh
      - name: Secret scan
        run: bash scripts/security-scan.sh
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Node check
        run: npm run check --if-present
      - name: Docker build
        run: docker build .
